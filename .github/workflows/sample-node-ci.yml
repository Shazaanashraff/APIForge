name: Node Sample API CI

on:
  push:
    paths:
      - 'sample-target-api-node/**'
      - '.github/workflows/sample-node-ci.yml'
  pull_request:
    paths:
      - 'sample-target-api-node/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sample-target-api-node/package-lock.json

      - name: Install dependencies
        working-directory: sample-target-api-node
        run: npm ci

      - name: Lint
        working-directory: sample-target-api-node
        run: npm run lint

      - name: Build
        working-directory: sample-target-api-node
        run: npm run build

      - name: Test
        working-directory: sample-target-api-node
        run: npm test

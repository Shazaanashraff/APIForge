server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: sample-target-api-java
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sample_java_db}
    username: ${SPRING_DATASOURCE_USERNAME:sample_java}
    password: ${SPRING_DATASOURCE_PASSWORD:sample_java_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    io.github.shazaanashraff.sample: DEBUG

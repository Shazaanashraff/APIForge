server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # All routes served from index.html (React Router handles client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend container
    location /api/ {
        proxy_pass http://apiforge-backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

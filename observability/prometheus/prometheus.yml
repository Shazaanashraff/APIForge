global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'apiforge-backend'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['apiforge-backend:8081']

  - job_name: 'sample-java-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['sample-target-api-java:8090']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# ──────────────────────────────────────────────────────────────────────────────
# APIForge — Full Local Stack
# All 13+ services. Requires Docker Desktop with ≥10 GB memory allocated.
# For daily dev (lighter), use docker-compose.lite.yml instead.
#
# Usage:
#   docker-compose up -d          # start all
#   docker-compose down           # stop all (preserves volumes)
#   docker-compose down -v        # stop all + delete volumes (full reset)
# ──────────────────────────────────────────────────────────────────────────────

version: '3.9'

networks:
  apiforge-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  kafka-data:
  keycloak-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:

services:

  # ── PostgreSQL + TimescaleDB ────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: apiforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apiforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apiforge_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-apiforge_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Initialization scripts: create extra databases (e.g. for Java sample API)
      - ./scripts/db-init:/docker-entrypoint-initdb.d
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apiforge} -d ${POSTGRES_DB:-apiforge_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apiforge-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 256m

  # ── MongoDB (for Node.js sample API) ────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: apiforge-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo_root_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-apiforge_samples}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  # ── Kafka (KRaft mode — no Zookeeper) ───────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: apiforge-kafka
    restart: unless-stopped
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single node settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: apiforge-kafka-cluster-1
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    mem_limit: 768m

  # ── Confluent Schema Registry ────────────────────────────────────────────────
  schema-registry:
    image: confluentinc/cp-schema-registry:latest
    container_name: apiforge-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
    ports:
      - "${SCHEMA_REGISTRY_PORT:-8085}:8085"
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/subjects || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m

  # ── Keycloak ─────────────────────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: apiforge-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      # Realm export is imported on first startup
      - ./observability/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    mem_limit: 768m

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: apiforge-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/etc/prometheus/console_libraries
      - --web.console.templates=/etc/prometheus/consoles
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: apiforge-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    networks:
      - apiforge-net
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  # ── Loki (log aggregation) ───────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: apiforge-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  # ── Promtail (ships Docker container logs → Loki) ────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: apiforge-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/loki/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - apiforge-net
    depends_on:
      - loki
    mem_limit: 128m

  # ── Tempo (distributed traces) ───────────────────────────────────────────────
  tempo:
    image: grafana/tempo:latest
    container_name: apiforge-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "${TEMPO_PORT:-3200}:3200"    # Tempo UI / query
      - "4317:4317"                   # OTLP gRPC receiver
      - "4318:4318"                   # OTLP HTTP receiver
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/tmp/tempo
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3200/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  # ── APIForge Backend ─────────────────────────────────────────────────────────
  apiforge-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apiforge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-apiforge_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-apiforge}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-apiforge_dev_secret}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/apiforge
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      SERVER_PORT: 8081
      SPRING_THREADS_VIRTUAL_ENABLED: "true"
    ports:
      - "${APIFORGE_SERVER_PORT:-8081}:8081"
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m

  # ── APIForge Frontend ────────────────────────────────────────────────────────
  apiforge-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apiforge-frontend
    restart: unless-stopped
    depends_on:
      - apiforge-backend
    ports:
      - "5173:80"
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 128m

  # ── Java Sample API (buggy Spring Boot + PostgreSQL) ─────────────────────────
  sample-target-api-java:
    build:
      context: ./sample-target-api-java
      dockerfile: Dockerfile
    container_name: apiforge-sample-java
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${JAVA_SAMPLE_DB_NAME:-sample_java_db}
      SPRING_DATASOURCE_USERNAME: ${JAVA_SAMPLE_DB_USER:-sample_java}
      SPRING_DATASOURCE_PASSWORD: ${JAVA_SAMPLE_DB_PASSWORD:-sample_java_secret}
      SERVER_PORT: 8090
    ports:
      - "${JAVA_SAMPLE_API_PORT:-8090}:8090"
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8090/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 256m

  # ── Node.js Sample API (buggy Express + MongoDB) ─────────────────────────────
  sample-target-api-node:
    build:
      context: ./sample-target-api-node
      dockerfile: Dockerfile
    container_name: apiforge-sample-node
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://apiforge:${MONGO_PASSWORD:-apiforge_secret}@mongodb:27017/${MONGO_DB:-apiforge_samples}
      PORT: 3000
      NODE_ENV: development
    ports:
      - "${NODE_SAMPLE_API_PORT:-3000}:3000"
    networks:
      - apiforge-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 256m
